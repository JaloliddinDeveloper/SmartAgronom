# Math Game — math.fastergo.uz
# Creative math quiz SPA served as static files.

server {
    listen 80;
    server_name math.fastergo.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name math.fastergo.uz;

    ssl_certificate     /etc/letsencrypt/live/math.fastergo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/math.fastergo.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff    always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Cache static assets aggressively — single HTML file, no versioning needed
    add_header Cache-Control "public, max-age=300";

    root /var/www/mathgame;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for faster loads
    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}
