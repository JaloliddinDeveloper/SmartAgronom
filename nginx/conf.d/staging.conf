# Staging — agronom.fastergo.uz + math.fastergo.uz
# Used by the CD pipeline on the staging server.
# Upstream container name matches the one started by cd.yml: aqlliagronom-staging

server {
    listen 80;
    server_name agronom.fastergo.uz;

    # Let's Encrypt ACME webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name agronom.fastergo.uz;

    ssl_certificate     /etc/letsencrypt/live/agronom.fastergo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agronom.fastergo.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options        DENY    always;
    add_header X-Content-Type-Options nosniff always;
    # HSTS disabled on staging to avoid browser lock-in with self-signed certs

    client_max_body_size 10M;

    # Use Docker's internal DNS so nginx doesn't fail to start if the
    # upstream container is momentarily unavailable.
    resolver 127.0.0.11 valid=30s;
    set $upstream aqlliagronom-staging;

    location /uploads/ {
        alias /app/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://$upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;
    }
}

# ── Math Game — math.fastergo.uz ────────────────────────────────────────────
server {
    listen 80;
    server_name math.fastergo.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name math.fastergo.uz;

    ssl_certificate     /etc/letsencrypt/live/math.fastergo.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/math.fastergo.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options nosniff always;

    add_header Cache-Control "public, max-age=300";

    root /var/www/mathgame;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 1024;
}
