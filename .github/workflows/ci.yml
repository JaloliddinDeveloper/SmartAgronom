name: CI — Build & Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aqlliagronom_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore SmartAgronom.sln

      - name: Build
        run: dotnet build SmartAgronom.sln -c Release --no-restore

      - name: Run Unit Tests
        run: dotnet test SmartAgronom.sln -c Release --no-build --verbosity normal
        env:
          ConnectionStrings__PostgreSQL: "Host=localhost;Port=5432;Database=aqlliagronom_test;Username=postgres;Password=test_password"
          Redis__ConnectionString: "localhost:6379"
          Jwt__SecretKey: "test_secret_key_minimum_256_bits_for_testing_purposes_only"
          Claude__ApiKey: "test_key"
          Embedding__ApiKey: "test_key"
          Telegram__BotToken: "123456789:test_token"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aqlliagronom-api:${{ github.sha }} .

      - name: Verify image
        run: docker run --rm aqlliagronom-api:${{ github.sha }} dotnet --info
