# Docker Compose — Full local development & production stack
# Usage: docker compose --env-file .env up -d

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aqlliagronom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aqlliagronom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aqlliagronom-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aqlliagronom"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aqlliagronom-redis
    restart: unless-stopped
    environment:
      # Exposed so health check can read it via $$REDIS_PASSWORD
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    command: >
      sh -c "redis-server --appendonly yes --requirepass $$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - aqlliagronom-network
    healthcheck:
      # Use $$REDIS_PASSWORD — $$ is escaped to single $ inside the container shell
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Qdrant Vector Database ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: aqlliagronom-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    networks:
      - aqlliagronom-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q ok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── AqlliAgronom API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: local
        BUILD_REVISION: dev
    container_name: aqlliagronom-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=aqlliagronom;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - Redis__ConnectionString=redis:6379,password=${REDIS_PASSWORD:-redis_secret}
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
      - Qdrant__ApiKey=${QDRANT_API_KEY:-}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Claude__ApiKey=${CLAUDE_API_KEY}
      - Embedding__ApiKey=${VOYAGE_API_KEY}
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN:-}
      - Telegram__WebhookUrl=${TELEGRAM_WEBHOOK_URL:-}
      - Telegram__UseWebhook=${TELEGRAM_USE_WEBHOOK:-false}
    ports:
      - "8080:8080"
    volumes:
      - api_logs:/app/logs
      - uploads_data:/app/uploads
    networks:
      - aqlliagronom-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: aqlliagronom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_DOMAIN: ${NGINX_DOMAIN:-localhost}
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aqlliagronom-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Certbot (SSL auto-renewal, staging/production only) ───────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: aqlliagronom-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renews certificates every 12 hours; no-op if cert is still valid.
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot 2>/dev/null || true;
          sleep 12h & wait $${!};
        done"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  api_logs:
    driver: local
  uploads_data:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  aqlliagronom-network:
    name: aqlliagronom-network
    driver: bridge
